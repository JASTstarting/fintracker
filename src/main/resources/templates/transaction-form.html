<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 th:text="${transactionId != null} ? '✏️ Редактирование операции' : '➕ Новая операция'">Новая операция</h2>
        <a th:href="@{/transactions}" class="btn btn-outline-secondary">← Назад к списку</a>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="${transactionId != null} ? @{/transactions/{id}/update(id=${transactionId})} : @{/transactions}"
                  th:object="${form}"
                  method="post"
                  novalidate>

                <!-- Тип операции -->
                <div class="mb-3">
                    <label class="form-label">Тип операции *</label>
                    <div class="btn-group" role="group">
                        <input type="radio" class="btn-check" name="type" id="typeIncome"
                               th:value="'INCOME'" th:field="*{type}">
                        <label class="btn btn-outline-success" for="typeIncome">📈 Доход</label>

                        <input type="radio" class="btn-check" name="type" id="typeExpense"
                               th:value="'EXPENSE'" th:field="*{type}">
                        <label class="btn btn-outline-danger" for="typeExpense">📉 Расход</label>
                    </div>
                    <!-- Вывод ошибки валидации -->
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('type')}"
                         th:errors="*{type}">Ошибка типа</div>
                </div>

                <!-- Сумма и валюта -->
                <div class="mb-3">
                    <label for="amount" class="form-label">Сумма *</label>
                    <div class="input-group">
                        <input type="number" step="0.01" class="form-control" id="amount"
                               th:field="*{amount}" placeholder="0.00"
                               th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid'">
                        <label>
                            <select class="form-select" th:field="*{currency}" style="max-width: 100px;"
                                    th:classappend="${#fields.hasErrors('currency')} ? 'is-invalid'">
                                <option value="RUB">RUB</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                            </select>
                        </label>
                    </div>
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('amount')}"
                         th:errors="*{amount}"></div>
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('currency')}"
                         th:errors="*{currency}"></div>
                </div>

                <!-- Дата -->
                <div class="mb-3">
                    <label for="transactionDate" class="form-label">Дата *</label>
                    <input type="date" class="form-control" id="transactionDate"
                           th:field="*{transactionDate}"
                           th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
                           th:classappend="${#fields.hasErrors('transactionDate')} ? 'is-invalid'">
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('transactionDate')}"
                         th:errors="*{transactionDate}"></div>
                </div>

                <!-- Поле: Категория -->
                <div class="mb-3">
                    <label for="categoryId" class="form-label">Категория *</label>
                    <select class="form-select" id="categoryId" th:field="*{categoryId}">
                        <option value="">-- Выберите категорию --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:data-type="${cat.type}">
                        </option>
                    </select>
                    <div th:if="${#fields.hasErrors('categoryId')}" class="text-danger small mt-1">
                        <span th:errors="*{categoryId}">Ошибка</span>
                    </div>
                </div>

                <!-- Комментарий -->
                <div class="mb-3">
                    <label for="transactionComment" class="form-label">Комментарий</label>
                    <textarea class="form-control" id="transactionComment" rows="3"
                              th:field="*{transactionComment}"
                              maxlength="500"
                              placeholder="Необязательно"
                              th:classappend="${#fields.hasErrors('transactionComment')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('transactionComment')}"
                         th:errors="*{transactionComment}"></div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/transactions}" class="btn btn-outline-secondary">Отмена</a>
                    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                </div>
            </form>
            <!-- Скрипт фильтрации категорий по типу операции -->
            <script th:inline="javascript">
                document.addEventListener('DOMContentLoaded', function() {
                    const typeRadios = document.querySelectorAll('input[name="type"]');
                    const categorySelect = document.getElementById('categoryId');

                    if (!categorySelect) return;

                    // Собираем категории из data-атрибутов
                    const allOptions = Array.from(categorySelect.options)
                        .filter(opt => opt.value) // убираем плейсхолдер
                        .map(opt => ({
                            value: opt.value,
                            text: opt.text,
                            type: opt.dataset.type  // Берём тип из data-type="INCOME"
                        }));

                    function filterCategories(selectedType) {
                        // Сохраняем текущее значение, если оно ещё валидно
                        const currentVal = categorySelect.value;

                        // Очищаем селект
                        categorySelect.innerHTML = '<option value="">-- Выберите категорию --</option>';

                        let foundCurrent = false;

                        // Добавляем только подходящие категории
                        allOptions.forEach(opt => {
                            if (opt.type === selectedType) {
                                const newOpt = document.createElement('option');
                                newOpt.value = opt.value;
                                newOpt.text = opt.text;
                                categorySelect.appendChild(newOpt);

                                if (opt.value === currentVal) {
                                    foundCurrent = true;
                                }
                            }
                        });

                        // Восстанавливаем выбор, если категория осталась в списке
                        if (foundCurrent) {
                            categorySelect.value = currentVal;
                        } else {
                            categorySelect.value = ''; // сброс, если категория не подходит
                        }
                    }

                    // Обработчик переключения типа операции
                    typeRadios.forEach(radio => {
                        radio.addEventListener('change', function() {
                            filterCategories(this.value);
                        });
                    });

                    // Инициализация при загрузке: если тип уже выбран
                    const selectedType = document.querySelector('input[name="type"]:checked');
                    if (selectedType) {
                        filterCategories(selectedType.value);
                    }
                });
            </script>
        </div>
    </div>
</div>

</body>
</html>
