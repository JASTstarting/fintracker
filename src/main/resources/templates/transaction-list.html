<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📋 Список операций</h2>
        <a th:href="@{/transactions/new}" class="btn btn-primary">➕ Добавить операцию</a>
    </div>

    <!-- Фильтры (можно вынести в отдельный фрагмент) -->
    <div class="card mb-3">
        <div class="card-body">
            <form method="get" th:action="@{/transactions}" class="row g-2">
                <div class="col-md-2">
                    <label>
                        <select name="type" class="form-select form-select-sm" th:value="${filters.type}">
                            <option value="">Все типы</option>
                            <option value="INCOME">Доходы</option>
                            <option value="EXPENSE">Расходы</option>
                        </select>
                    </label>
                </div>
                <div class="col-md-2">
                    <label>
                        <select name="categoryId" class="form-select form-select-sm" th:value="${filters.categoryId}">
                            <option value="">Все категории</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name + ' (' + (cat.type == 'INCOME' ? 'доход' : 'расход') + ')'}">
                            </option>
                        </select>
                    </label>
                </div>
                <div class="col-md-2">
                    <label>
                        <input type="date" name="from" class="form-control form-control-sm" th:value="${filters.from}" placeholder="От">
                    </label>
                </div>
                <div class="col-md-2">
                    <label>
                        <input type="date" name="to" class="form-control form-control-sm" th:value="${filters.to}" placeholder="До">
                    </label>
                </div>

                <div class="col-md-2">
                    <label>
                        <input type="text" name="comment" class="form-control form-control-sm"
                               placeholder="🔍 Комментарий" th:value="${filters.comment}">
                    </label>
                </div>

                <div class="col-md-2">
                    <button type="submit" class="btn btn-sm btn-primary w-100">Фильтр</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(transactions)}" class="text-center py-4">
                <p>Нет операций. <a th:href="@{/transactions/new}">Добавьте первую!</a></p>
            </div>
            <table th:if="${!#lists.isEmpty(transactions)}" class="table table-hover">
                <thead class="table-light">
                <tr>
                    <th>Дата</th><th>Тип</th><th>Категория</th>
                    <th class="text-end">Сумма</th><th>Комментарий</th>
                    <th class="text-center">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${transactions}">
                    <td th:text="${#temporals.format(t.transactionDate, 'dd.MM.yyyy')}"></td>
                    <td>
                        <span th:if="${t.type == 'INCOME'}" class="badge bg-success">Доход</span>
                        <span th:if="${t.type == 'EXPENSE'}" class="badge bg-danger">Расход</span>
                    </td>
                    <td th:text="${t.categoryName != null ? t.categoryName : '—'}">—</td>
                    <td class="text-end">
                        <span th:class="${t.type == 'INCOME' ? 'amount-income' : 'amount-expense'}"
                              th:text="${#numbers.formatDecimal(t.amount, 1, 2, 'POINT')} + ' ' + ${t.currency}"></span>
                    </td>
                    <td th:text="${#strings.abbreviate(t.transactionComment, 30)}">—</td>
                    <td class="text-center">
                        <a th:href="@{/transactions/{id}/edit(id=${t.id})}"
                           class="btn btn-sm btn-outline-primary">✏️</a>
                        <form th:action="@{/transactions/{id}/archive(id=${t.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Архивировать?')">
                            <button type="submit" class="btn btn-sm btn-outline-secondary">📦</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Пагинация -->
    <nav th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{/transactions(page=${currentPage - 1}, size=${size}, type=${filters.type}, categoryId=${filters.categoryId}, from=${filters.from}, to=${filters.to})}">«</a>
            </li>
            <li class="page-item disabled"><span class="page-link" th:text="${currentPage + 1} + ' / ' + ${totalPages}"></span></li>
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/transactions(page=${currentPage + 1}, size=${size}, type=${filters.type}, categoryId=${filters.categoryId}, from=${filters.from}, to=${filters.to})}">»</a>
            </li>
        </ul>
    </nav>
</div>

</body>
</html>
